reference:
  enabled: false
  continue_on_error: false
  generators:
    openseed_semantic:
      enabled: false
      class_name: OpenSeeDReference
      input_key: camera_videos
      output_key: semantic_masks
      num_classes_key: semantic_num_classes
      ignore_label_key: semantic_ignore_label
      repo_path: src/third_party/OpenSeeD
      config_path: src/third_party/OpenSeeD/configs/openseed/openseed_swint_lang.yaml
      weight_path: pretrained_models/segmentation/model_state_dict_swint_51.2ap.pt
      device: cuda
      force: false
      vocabulary:
        - road
        - lane marking
        - sidewalk
        - vehicle
        - car
        - truck
        - bus
        - pedestrian
        - cyclist
        - traffic light
        - traffic sign
        - building
        - vegetation
        - sky
        - pole
        - barrier
    depth_reference:
      enabled: false
      class_name: DepthReference
    object_tracks:
      enabled: false
      class_name: ObjectTrackReference
    planning_response:
      enabled: false
      class_name: PlanningResponseReference
