reference:
  enabled: true
  continue_on_error: false
  generators:
    openseed_semantic:
      enabled: false
      input_key: camera_videos
      output_key: semantic_masks
      num_classes_key: semantic_num_classes
      ignore_label_key: semantic_ignore_label
      repo_path: src/third_party/OpenSeeD
      config_path: src/third_party/OpenSeeD/configs/openseed/openseed_swint_lang.yaml
      weight_path: pretrained_models/segmentation/model_state_dict_swint_51.2ap.pt
      device: cuda
      force: false
      vocabulary:
        - road
        - lane marking
        - sidewalk
        - vehicle
        - car
        - truck
        - bus
        - pedestrian
        - cyclist
        - traffic light
        - traffic sign
        - building
        - vegetation
        - sky
        - pole
        - barrier
    depthanything_depth:
      enabled: true
      input_key: camera_videos
      output_key: depth_maps
      num_frames_key: depth_num_frames
      repo_path: src/third_party
      weight_path: pretrained_models/depth
      depth_checkpoint_path: pretrained_models/depth/metric_video_depth_anything_vits.pth
      device: cuda
      encoder: vits
      target_fps: 12
      input_size: 400
      target_size:
        - 450
        - 800
      depth_fp32: false
      force: false
    object_tracks:
      enabled: false
